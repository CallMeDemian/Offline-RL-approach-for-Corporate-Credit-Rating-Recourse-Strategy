# ============================================================================
# diagnostic_candidates — Stage6-evaluated, NOT RL training labels.
# AB1/AB2 decompose the cost axis (ablation).
# AB3 is the anti-recourse anchor: shows the policy never recommends expansion
# for distressed firms, and gives genuinely expansionary observed firm-years a
# nearer projection reference IN DIAGNOSTICS ONLY.
# ============================================================================
diagnostic_candidates:
  AB1_cogs_only:
    tier: B_operating_efficiency
    paper_role: axis_ablation
    action__cogs_ratio_chg: -0.015
    action__ppe_pct: 0.0
    action__inv_turnover_chg: 0.0
    action__ar_turnover_chg: 0.0
    action__ap_turnover_chg: 0.0
    action__short_debt_pct: 0.0
    action__long_debt_pct: 0.0
    action__bond_pct: 0.0
    action__revenue_growth: 0.0
    action__sga_ratio_chg: 0.0
  AB2_sga_only:
    tier: B_operating_efficiency
    paper_role: axis_ablation
    action__sga_ratio_chg: -0.010
    action__ppe_pct: 0.0
    action__inv_turnover_chg: 0.0
    action__ar_turnover_chg: 0.0
    action__ap_turnover_chg: 0.0
    action__short_debt_pct: 0.0
    action__long_debt_pct: 0.0
    action__bond_pct: 0.0
