# ============================================================================
# final_candidate_library_v32.yaml
# Credit-Recourse Candidate Action Set — Controllability-Ladder Design
# ----------------------------------------------------------------------------
# Target file: data/final_freeze/configs/final_candidate_library.yaml
#
# This file is the SINGLE SOURCE OF TRUTH for the candidate label set.
# `main_train_labels` below MUST be mirrored verbatim into
#   final_action_contract.yaml -> candidate_label_rule.train_labels
# and any hardcoded label list elsewhere (e.g. tools/99 ALLOWED_TRAIN,
# stage6 selector) MUST be replaced by a read of this file.
#
# Simulator interface stays 10D continuous. RL policy = discrete Candidate IQL.
# ============================================================================

contract_version: final_candidate_library_v32_controllability_ladder
source_of_truth: data/final_freeze/configs/final_candidate_library.yaml

# --- Design philosophy -------------------------------------------------------
# 1. Each candidate = a nameable, board-authorizable, one-fiscal-year program.
# 2. Dimensions are ordered on a CONTROLLABILITY LADDER, not two clean bins:
#      Level A  Financial & investment policy   (debt issue/repay, capex)
#              -> firm signs these directly. Highest controllability.
#      Level B  Operating & working-capital policy (turnover, cost ratios)
#              -> firm sets a target; outcome carries execution risk and
#                 partial exogeneity (input prices, customers, suppliers).
#      Level C  Revenue growth
#              -> largely exogenous (demand, price, macro). NOT a lever.
#    Main RL action space = Level A + Level B. Level C is scenario robustness only.
# 3. Magnitudes are fixed before the final run through an audit-or-calibration protocol
#    using only the training-period pseudo-action distribution. The runnable
#    defaults below may be replaced only when the calibration report supports it.
# 4. Lean training label set (11). Finer / scenario / diagnostic candidates
#    are Stage6-evaluated but NOT RL training labels.
# 5. Sign conventions verified against financial_simulator.py:
#      bp_eff.inv_turnover = bp.inv_turnover + inv_turnover_chg
#      inv_t1 = cogs_t1 / inv_turnover   -> higher turnover => lower inventory
#      ar_t1  = revenue_t1 / ar_turnover -> higher turnover => lower receivables
#      ap_t1  = cogs_t1 / ap_turnover    -> lower  turnover => higher payables
#      *_debt_pct / ppe_pct are fractional changes of the existing amount.
#      cogs_ratio_chg / sga_ratio_chg are %pt changes to the ratio.

action_columns:
  - action__ppe_pct
  - action__inv_turnover_chg
  - action__ar_turnover_chg
  - action__ap_turnover_chg
  - action__short_debt_pct
  - action__long_debt_pct
  - action__bond_pct
  - action__revenue_growth
  - action__cogs_ratio_chg
  - action__sga_ratio_chg

# --- The 11 main RL training labels (projection targets + IQL action space) ---
# Mirror this exact list into final_action_contract.yaml train_labels.
main_train_labels:
  - A0_noop
  - DL1_deleverage_mild
  - DL2_deleverage_moderate
  - RF1_short_debt_refinance
  - CX1_capex_discipline
  - WC1_working_capital_tightening
  - WC2_supplier_financing
  - OE1_cost_efficiency_mild
  - OE2_cost_efficiency_moderate
  - MX1_cost_and_deleverage
  - MX2_liquidity_rescue

final_rl_label: C3_candidate_iql

# ============================================================================
# fixed_candidates — must equal main_train_labels exactly (load_action_space
# enforces sorted(fixed) == sorted(train_labels)).
# ============================================================================
fixed_candidates:

  A0_noop:
    tier: baseline
    paper_role: main
    intent: "No managerial intervention. Counterfactual reference for every firm."
    action__ppe_pct: 0.0
    action__inv_turnover_chg: 0.0
    action__ar_turnover_chg: 0.0
    action__ap_turnover_chg: 0.0
    action__short_debt_pct: 0.0
    action__long_debt_pct: 0.0
    action__bond_pct: 0.0
    action__revenue_growth: 0.0
    action__cogs_ratio_chg: 0.0
    action__sga_ratio_chg: 0.0

  # -- Level A: financial & investment policy ---------------------------------
  DL1_deleverage_mild:
    tier: A_financial_policy
    paper_role: main
    intent: "Repay across the debt stack, weighted to short-term borrowings."
    action__ppe_pct: 0.0
    action__inv_turnover_chg: 0.0
    action__ar_turnover_chg: 0.0
    action__ap_turnover_chg: 0.0
    action__short_debt_pct: -0.25
    action__long_debt_pct: -0.10
    action__bond_pct: -0.10
    action__revenue_growth: 0.0
    action__cogs_ratio_chg: 0.0
    action__sga_ratio_chg: 0.0

  DL2_deleverage_moderate:
    tier: A_financial_policy
    paper_role: main
    intent: "Aggressive one-year deleveraging across short/long/bond debt."
    action__ppe_pct: 0.0
    action__inv_turnover_chg: 0.0
    action__ar_turnover_chg: 0.0
    action__ap_turnover_chg: 0.0
    action__short_debt_pct: -0.40
    action__long_debt_pct: -0.20
    action__bond_pct: -0.15
    action__revenue_growth: 0.0
    action__cogs_ratio_chg: 0.0
    action__sga_ratio_chg: 0.0

  RF1_short_debt_refinance:
    tier: A_financial_policy
    paper_role: main
    intent: "Maturity restructuring: cut short-term debt, partly replace with
             long-term debt and bonds. Net leverage roughly flat; reduces
             rollover and coverage risk."
    action__ppe_pct: 0.0
    action__inv_turnover_chg: 0.0
    action__ar_turnover_chg: 0.0
    action__ap_turnover_chg: 0.0
    action__short_debt_pct: -0.30
    action__long_debt_pct: 0.15
    action__bond_pct: 0.10
    action__revenue_growth: 0.0
    action__cogs_ratio_chg: 0.0
    action__sga_ratio_chg: 0.0

  CX1_capex_discipline:
    tier: A_investment_policy
    paper_role: main
    intent: "Defer / trim tangible investment to conserve cash."
    action__ppe_pct: -0.10
    action__inv_turnover_chg: 0.0
    action__ar_turnover_chg: 0.0
    action__ap_turnover_chg: 0.0
    action__short_debt_pct: 0.0
    action__long_debt_pct: 0.0
    action__bond_pct: 0.0
    action__revenue_growth: 0.0
    action__cogs_ratio_chg: 0.0
    action__sga_ratio_chg: 0.0

  # -- Level B: operating & working-capital policy ----------------------------
  WC1_working_capital_tightening:
    tier: B_working_capital
    paper_role: main
    intent: "Faster inventory turnover and receivables collection. Frees cash."
    action__ppe_pct: 0.0
    action__inv_turnover_chg: 0.50
    action__ar_turnover_chg: 0.50
    action__ap_turnover_chg: 0.0
    action__short_debt_pct: 0.0
    action__long_debt_pct: 0.0
    action__bond_pct: 0.0
    action__revenue_growth: 0.0
    action__cogs_ratio_chg: 0.0
    action__sga_ratio_chg: 0.0

  WC2_supplier_financing:
    tier: B_working_capital
    paper_role: main
    intent: "WC1 plus stretched supplier payment period (payables financing).
             NOTE: simulator does not model supplier-relationship risk; treat
             the AP component as a liquidity lever, not a free lunch."
    action__ppe_pct: 0.0
    action__inv_turnover_chg: 0.50
    action__ar_turnover_chg: 0.50
    action__ap_turnover_chg: -0.50
    action__short_debt_pct: 0.0
