    action__sga_ratio_chg: 0.0

# ============================================================================
# Row-conditional rule-based baseline. NOT a projection label, NOT an RL label.
# ============================================================================
row_conditional_baselines:
  C2_weakest_component_rule:
    generator: sector_phi_weakest_component_top1_rule
    projection_label: false
    # Maps the weakest sector-Phi component to ONE main candidate:
    mapping:
      derived__debt_to_assets: DL1_deleverage_mild
      derived__financial_cost_to_revenue: DL1_deleverage_mild
      derived__cogs_to_revenue: OE2_cost_efficiency_moderate
      derived__sga_to_revenue: OE2_cost_efficiency_moderate
      derived__operating_margin: OE2_cost_efficiency_moderate
      derived__roa_proxy: OE2_cost_efficiency_moderate

# ============================================================================
# Magnitude audit/calibration recipe — run BEFORE the final paper run.
# Uses train-period pseudo-actions to either confirm defaults or replace them with stable quantiles.
# ============================================================================
magnitude_audit_calibration:
  source: stage2 input_splits observed pseudo-actions (favorable direction only)
  rule:
    default_policy: "Use runnable defaults unless train-period favorable-direction quantiles are stable and sufficiently supported."
    mild_magnitude: "If recalibrated, use P65 of favorable-direction observed one-year changes."
    moderate_magnitude: "If recalibrated, use P85 of favorable-direction observed one-year changes."
  favorable_direction:
    ppe_pct: negative          # capex discipline = lower PPE growth
    inv_turnover_chg: positive
    ar_turnover_chg: positive
    ap_turnover_chg: negative  # longer payment period = liquidity release
    short_debt_pct: negative
    long_debt_pct: negative
    bond_pct: negative
    cogs_ratio_chg: negative
    sga_ratio_chg: negative
  clip_to_action_bounds: true
  report: "appendix table of P50/P65/P85 and chosen magnitude per dimension"

# ============================================================================
# Contingency: lean-9 variant if the projection histogram shows any main
# candidate with too few rows for stable soft-target BC (~<100).
# Drop RF1_short_debt_refinance and MX2_liquidity_rescue; their roles are
# partly covered by DL1 and the WC candidates. Re-run with 9 train labels.
# ============================================================================
lean_9_fallback_drop:
  - RF1_short_debt_refinance
  - MX2_liquidity_rescue

# ============================================================================
# Verifier semantic guards (add to tools/99).
# ============================================================================
verifier_guards:
  - "fixed_candidates keys == main_train_labels (exact set equality)"
  - "scenario_candidates and diagnostic_candidates keys MUST NOT appear in train_labels"
  - "working-capital candidates (WCx, MX2, X-style): inv_turnover_chg >= 0 and ar_turnover_chg >= 0"
  - "ap_turnover_chg < 0 allowed only for supplier-financing candidates (WC2, MX2)"
  - "no active training candidate may use a deprecated prefix or row-conditional baseline prefix"
  - "AB3_expansion_anchor MUST NOT appear in train_labels or in C2 mapping"
  - "every projection label seen in Stage2 output must be in main_train_labels"
