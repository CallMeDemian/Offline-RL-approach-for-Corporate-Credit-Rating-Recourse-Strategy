collinearity:
  max_iterations: 10
  threshold: 0.7
direction_weak_threshold: 0.03
domain_filters:
  diagnostic_only_variables:
  - kospi_dummy
  - sector_7
  - sector_year_rating_count
  - sector_year_rating_count_lag1
  - industry_avg_rating
  industry_allowlist:
  - industry_avg_rating_lag1_self_excl
  - industry_median_rating_lag1_self_excl
  - industry_bad_grade_share_lag1_self_excl
  - industry_b_or_lower_share_lag1_self_excl
  - industry_downgrade_rate_lag1_self_excl
  - industry_upgrade_rate_lag1_self_excl
  - industry_net_downgrade_rate_lag1_self_excl
  - industry_rating_std_lag1_self_excl
  - industry_rating_iqr_lag1_self_excl
  liquidity_exclude_terms:
  - 매출액
  - 매출원가
  - 매출총이익
  - 영업수익
  - 수익(매출액)
outputs:
  create_backward_compat: true
  create_latest_alias: true
  directory: outputs
paths:
  stage1b: stage1b
  stage1c: stage1c
  stage2: stage2
priority_order:
  financial:
  - 수익성
  - 안정성
  - 부채상환능력
  - 유동성
  - 활동성
  - 성장성
  nonfinancial:
  - 산업위험
  - 경영위험
  - 영업위험
  - 재무위험
  - 신뢰도
selection_score_weights:
  iv: 0.3
  kw_eta2: 0.2
  monotonicity: 0.2
  spearman: 0.3
split:
  dev_end: 2019
  dev_start: 2002
  oot_end: 2023
  oot_start: 2020
weight_prior:
  cap: 0.3
  custom_floors:
    R185: 0.02
    financial_data_completeness: 0.02
    R241: 0.02
    ratio_missing_rate: 0.02
  default_floor: 0.05
  notes:
    IFRS16_리스: sparse pre-2019; pipeline treats missing as 0 with indicator flag
    R185: weak growth signal; prior pinned to 0.02
    financial_data_completeness: Dev signal near zero; diagnostic only at 0.02
    R241: 'R241: selected retained-earnings-growth alias-group variable; inherits
      R185 weak-growth prior/floor at 0.02.'
    ratio_missing_rate: 'ratio_missing_rate: inverse financial_data_completeness reliability
      proxy; higher missingness is worse and prior is floor-reduced at 0.02.'
  score_overrides:
    R185: 0.0
    financial_data_completeness: 0.0
    R241: 0.0
    ratio_missing_rate: 0.0
winsorization:
  enabled: true
  lower_percentile: 1
  upper_percentile: 99
