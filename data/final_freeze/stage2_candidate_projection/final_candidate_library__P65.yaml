    projection_label: false
    mapping:
      derived__debt_to_assets: DL1_deleverage_mild
      derived__financial_cost_to_revenue: DL1_deleverage_mild
      derived__cogs_to_revenue: OE2_cost_efficiency_moderate
      derived__sga_to_revenue: OE2_cost_efficiency_moderate
      derived__operating_margin: OE2_cost_efficiency_moderate
      derived__roa_proxy: OE2_cost_efficiency_moderate
magnitude_audit_calibration:
  source: stage2 input_splits observed pseudo-actions (favorable direction only)
  rule:
    default_policy: Use runnable defaults unless train-period favorable-direction
      quantiles are stable and sufficiently supported.
    mild_magnitude: If recalibrated, use P65 of favorable-direction observed one-year
      changes.
    moderate_magnitude: If recalibrated, use P85 of favorable-direction observed one-year
      changes.
  favorable_direction:
    ppe_pct: negative
    inv_turnover_chg: positive
    ar_turnover_chg: positive
    ap_turnover_chg: negative
    short_debt_pct: negative
    long_debt_pct: negative
    bond_pct: negative
    cogs_ratio_chg: negative
    sga_ratio_chg: negative
  clip_to_action_bounds: true
  report: appendix table of P50/P65/P85 and chosen magnitude per dimension
lean_9_fallback_drop:
- RF1_short_debt_refinance
- MX2_liquidity_rescue
verifier_guards:
- fixed_candidates keys == main_train_labels (exact set equality)
- scenario_candidates and diagnostic_candidates keys MUST NOT appear in train_labels
- 'working-capital candidates (WCx, MX2, X-style): inv_turnover_chg >= 0 and ar_turnover_chg
  >= 0'
- ap_turnover_chg < 0 allowed only for supplier-financing candidates (WC2, MX2)
- no active training candidate may use a deprecated prefix or row-conditional baseline
  prefix
- AB3_expansion_anchor MUST NOT appear in train_labels or in C2 mapping
- every projection label seen in Stage2 output must be in main_train_labels
magnitude_recalibration:
  mode: inner_train_quantile_recalibrated
  selected_quantile: 65
  method: tier_preserving_per_dimension_inner_train_abs_action_quantile
  tier_geometry_preservation: scale empirical per-dimension quantile by base candidate
    abs(value)/max_abs(value) before clipping
  unique_action_vector_count: 11
  fallback_to_base_dimensions: []
  oot_used_for_calibration: false
  oracle_outcome_used_for_calibration: false
